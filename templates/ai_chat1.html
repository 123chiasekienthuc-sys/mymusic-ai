<!-- templates/ai_chat.html -->
<div class="ai-chat-widget" id="aiChatWidget">
    <div class="chat-header" onclick="toggleChat()">
        <i class="fas fa-robot me-2"></i>
        <span>Trợ lý AI</span>
        <i class="fas fa-chevron-up ms-auto" id="chatToggleIcon"></i>
    </div>
    <div class="chat-body" id="chatBody">
        <div class="chat-messages" id="chatMessages">
            <div class="message ai-message">
                <div class="message-content">
                    Xin chào! Tôi là trợ lý SQL. Bạn cần giúp gì về bài tập hôm nay?
                </div>
                <div class="message-time">
                    <i class="far fa-clock"></i> Vừa xong
                </div>
            </div>
        </div>
        <div class="chat-input">
            <input type="text" id="chatInput" placeholder="Nhập câu hỏi..." onkeypress="handleChatKeyPress(event)">
            <button onclick="sendChatMessage()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>
</div>

<style>
.ai-chat-widget {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 350px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 5px 30px rgba(0,0,0,0.2);
    z-index: 1000;
}

.chat-header {
    background: linear-gradient(135deg, #4361ee, #7209b7);
    color: white;
    padding: 15px;
    border-radius: 10px 10px 0 0;
    cursor: pointer;
    display: flex;
    align-items: center;
}

.chat-body {
    height: 400px;
    display: flex;
    flex-direction: column;
}

.chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
}

.message {
    margin-bottom: 15px;
    display: flex;
    flex-direction: column;
}

.ai-message {
    align-items: flex-start;
}

.user-message {
    align-items: flex-end;
}

.message-content {
    max-width: 80%;
    padding: 10px 15px;
    border-radius: 15px;
    font-size: 14px;
}

.ai-message .message-content {
    background: #f0f2f5;
    color: #1a1a1a;
}

.user-message .message-content {
    background: #4361ee;
    color: white;
}

.message-time {
    font-size: 11px;
    color: #999;
    margin-top: 3px;
}

.chat-input {
    display: flex;
    padding: 10px;
    border-top: 1px solid #dee2e6;
}

.chat-input input {
    flex: 1;
    padding: 8px 12px;
    border: 1px solid #dee2e6;
    border-radius: 20px;
    margin-right: 10px;
}

.chat-input button {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: none;
    background: #4361ee;
    color: white;
    cursor: pointer;
    transition: all 0.3s;
}

.chat-input button:hover {
    background: #3046c0;
    transform: scale(1.05);
}
</style>

<script>
let chatVisible = true;

function toggleChat() {
    const chatBody = document.getElementById('chatBody');
    const icon = document.getElementById('chatToggleIcon');
    
    if (chatVisible) {
        chatBody.style.display = 'none';
        icon.className = 'fas fa-chevron-down ms-auto';
    } else {
        chatBody.style.display = 'flex';
        icon.className = 'fas fa-chevron-up ms-auto';
    }
    chatVisible = !chatVisible;
}

async function sendChatMessage() {
    const input = document.getElementById('chatInput');
    const message = input.value.trim();
    
    if (!message) return;
    
    // Hiển thị tin nhắn của user
    addMessage(message, 'user');
    input.value = '';
    
    // Hiển thị typing indicator
    const typingId = showTypingIndicator();
    
    try {
        const response = await fetch('/api/ai-chat', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ 
                message: message,
                context: document.getElementById('exerciseTitle')?.textContent || ''
            })
        });
        
        const data = await response.json();
        
        // Xóa typing indicator
        removeTypingIndicator(typingId);
        
        if (data.success) {
            addMessage(data.response, 'ai');
        } else {
            addMessage('Xin lỗi, tôi gặp sự cố. Vui lòng thử lại!', 'ai');
        }
    } catch (error) {
        removeTypingIndicator(typingId);
        addMessage('Có lỗi kết nối. Vui lòng thử lại!', 'ai');
    }
}

function addMessage(text, sender) {
    const messagesDiv = document.getElementById('chatMessages');
    const messageDiv = document.createElement('div');
    messageDiv.className = `message ${sender}-message`;
    
    const time = new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
    
    messageDiv.innerHTML = `
        <div class="message-content">${text}</div>
        <div class="message-time">
            <i class="far fa-clock"></i> ${time}
        </div>
    `;
    
    messagesDiv.appendChild(messageDiv);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function showTypingIndicator() {
    const messagesDiv = document.getElementById('chatMessages');
    const id = 'typing-' + Date.now();
    
    const typingDiv = document.createElement('div');
    typingDiv.id = id;
    typingDiv.className = 'message ai-message';
    typingDiv.innerHTML = `
        <div class="message-content">
            <div class="typing-indicator" style="display: flex;">
                <span></span><span></span><span></span>
            </div>
        </div>
    `;
    
    messagesDiv.appendChild(typingDiv);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
    return id;
}

function removeTypingIndicator(id) {
    const element = document.getElementById(id);
    if (element) element.remove();
}

function handleChatKeyPress(event) {
    if (event.key === 'Enter') {
        sendChatMessage();
    }
}

// Thêm chat widget vào trang
document.addEventListener('DOMContentLoaded', function() {
    const chatWidget = document.createElement('div');
    chatWidget.innerHTML = `
        <div class="ai-chat-widget" id="aiChatWidget">
            <div class="chat-header" onclick="toggleChat()">
                <i class="fas fa-robot me-2"></i>
                <span>Trợ lý AI</span>
                <i class="fas fa-chevron-up ms-auto" id="chatToggleIcon"></i>
            </div>
            <div class="chat-body" id="chatBody">
                <div class="chat-messages" id="chatMessages">
                    <div class="message ai-message">
                        <div class="message-content">
                            Xin chào! Tôi là trợ lý SQL. Bạn cần giúp gì về bài tập hôm nay?
                        </div>
                        <div class="message-time">
                            <i class="far fa-clock"></i> Vừa xong
                        </div>
                    </div>
                </div>
                <div class="chat-input">
                    <input type="text" id="chatInput" placeholder="Nhập câu hỏi..." onkeypress="handleChatKeyPress(event)">
                    <button onclick="sendChatMessage()">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    `;
    document.body.appendChild(chatWidget);
});
</script>
