{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="bi bi-person-plus"></i> Thêm Nhạc Sĩ Mới</h4>
                </div>
                <div class="card-body">
                    <form method="POST" action="/nhacsi/add" enctype="multipart/form-data">
			<input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                        <!-- Tên nhạc sĩ -->
                        <div class="mb-3">
                            <label for="tennhacsi" class="form-label">Tên nhạc sĩ <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="tennhacsi" name="tennhacsi" required>
                        </div>
                        
                        <!-- Thông tin cơ bản -->
                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label for="ngaysinh" class="form-label">Ngày sinh</label>
                                <input type="date" class="form-control" id="ngaysinh" name="ngaysinh">
                            </div>
                            <div class="col-md-4">
                                <label for="gioitinh" class="form-label">Giới tính</label>
                                <select class="form-select" id="gioitinh" name="gioitinh">
                                    <option value="Nam">Nam</option>
                                    <option value="Nữ">Nữ</option>
                                    <option value="Khác">Khác</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label for="quequan" class="form-label">Quê quán</label>
                                <input type="text" class="form-control" id="quequan" name="quequan">
                            </div>
                        </div>
                        
                        <!-- Ảnh đại diện -->
                        <div class="mb-3">
                            <label for="avatar" class="form-label">Ảnh đại diện</label>
                            <input class="form-control" type="file" id="avatar" name="avatar" accept="image/*">
                            <div class="form-text">Chấp nhận: JPG, PNG, GIF (tối đa 5MB)</div>
                        </div>
                        
                        <!-- Tiểu sử -->
                        <div class="mb-3">
                            <label for="tieusu" class="form-label">Tiểu sử</label>
                            <textarea class="form-control" id="tieusu" name="tieusu" rows="4"></textarea>
                        </div>
                        
                        <!-- Nút submit -->
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="/nhacsi" class="btn btn-secondary me-md-2">
                                <i class="bi bi-arrow-left"></i> Quay lại
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save"></i> Lưu thông tin
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Set ngày mặc định là hôm nay
document.getElementById('ngaysinh').valueAsDate = new Date();

// Validate kích thước ảnh
document.querySelector('form').addEventListener('submit', function(e) {
    const fileInput = document.getElementById('avatar');
    if (fileInput.files[0] && fileInput.files[0].size > 5 * 1024 * 1024) {
        e.preventDefault();
        alert('Ảnh tải lên vượt quá 5MB!');
    }
});

// Kiểm tra kích thước ảnh
document.querySelector('form').addEventListener('submit', function(e) {
    const avatarInput = document.getElementById('avatar');
    if (avatarInput.files[0]) {
        const fileSize = avatarInput.files[0].size / 1024 / 1024; // MB
        if (fileSize > 5) { // 5MB
            e.preventDefault();
            alert('Ảnh đại diện không được vượt quá 5MB');
            return false;
        }
        
        // Kiểm tra định dạng
        const allowedTypes = ['image/jpeg', 'image/png', 'image/gif'];
        if (!allowedTypes.includes(avatarInput.files[0].type)) {
            e.preventDefault();
            alert('Chỉ chấp nhận ảnh JPG, PNG hoặc GIF');
            return false;
        }
    }
});
</script>

<style>
.form-label.required:after {
    content: " *";
    color: #dc3545;
}
</style>
{% endblock %}
