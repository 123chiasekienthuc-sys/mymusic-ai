<!-- templates/ai_chat.html -->
<div class="ai-chat-widget" id="aiChatWidget">
    <div class="chat-header" onclick="toggleChat()">
        <i class="fas fa-robot me-2"></i>
        <span>Trợ lý AI</span>
        <i class="fas fa-chevron-up ms-auto" id="chatToggleIcon"></i>
    </div>
    <div class="chat-body" id="chatBody">
        <div class="chat-messages" id="chatMessages">
            <div class="message ai-message">
                <div class="message-content">
                    Xin chào! Tôi là trợ lý SQL. Bạn cần giúp gì về bài tập hôm nay?
                </div>
                <div class="message-time">
                    <i class="far fa-clock"></i> Vừa xong
                </div>
            </div>
        </div>
        <div class="chat-input">
            <input type="text" id="chatInput" placeholder="Nhập câu hỏi..." onkeypress="handleChatKeyPress(event)">
            <button onclick="sendChatMessage()" id="sendChatBtn">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>
</div>

<style>
.ai-chat-widget {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 350px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 5px 30px rgba(0,0,0,0.2);
    z-index: 1000;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

.chat-header {
    background: linear-gradient(135deg, #4361ee, #7209b7);
    color: white;
    padding: 15px;
    border-radius: 10px 10px 0 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    font-weight: 600;
}

.chat-body {
    height: 400px;
    display: flex;
    flex-direction: column;
    background: #f8f9fa;
    border-radius: 0 0 10px 10px;
}

.chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
}

.message {
    margin-bottom: 15px;
    display: flex;
    flex-direction: column;
}

.ai-message {
    align-items: flex-start;
}

.user-message {
    align-items: flex-end;
}

.message-content {
    max-width: 80%;
    padding: 10px 15px;
    border-radius: 15px;
    font-size: 14px;
    line-height: 1.5;
    word-wrap: break-word;
}

.ai-message .message-content {
    background: #e9ecef;
    color: #1a1a1a;
    border-bottom-left-radius: 5px;
}

.user-message .message-content {
    background: #4361ee;
    color: white;
    border-bottom-right-radius: 5px;
}

.message-time {
    font-size: 11px;
    color: #999;
    margin-top: 3px;
    margin-left: 5px;
    margin-right: 5px;
}

.chat-input {
    display: flex;
    padding: 10px;
    border-top: 1px solid #dee2e6;
    background: white;
    border-radius: 0 0 10px 10px;
}

.chat-input input {
    flex: 1;
    padding: 10px 15px;
    border: 1px solid #dee2e6;
    border-radius: 20px;
    margin-right: 10px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.3s;
}

.chat-input input:focus {
    border-color: #4361ee;
    box-shadow: 0 0 0 2px rgba(67, 97, 238, 0.2);
}

.chat-input button {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: none;
    background: #4361ee;
    color: white;
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
}

.chat-input button:hover {
    background: #3046c0;
    transform: scale(1.05);
}

.chat-input button:active {
    transform: scale(0.95);
}

.typing-indicator {
    display: flex;
    align-items: center;
    gap: 3px;
    padding: 5px 0;
}

.typing-indicator span {
    height: 8px;
    width: 8px;
    background: #4361ee;
    border-radius: 50%;
    display: inline-block;
    animation: typing 1.4s infinite ease-in-out both;
}

.typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
.typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
.typing-indicator span:nth-child(3) { animation-delay: 0; }

@keyframes typing {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.6; }
    40% { transform: scale(1); opacity: 1; }
}
</style>

<script>
// Đảm bảo các hàm có trong global scope
window.toggleChat = function() {
    const chatBody = document.getElementById('chatBody');
    const icon = document.getElementById('chatToggleIcon');
    const chatWidget = document.getElementById('aiChatWidget');
    
    if (!chatBody || !icon) return;
    
    if (chatBody.style.display === 'none') {
        chatBody.style.display = 'flex';
        icon.className = 'fas fa-chevron-up ms-auto';
    } else {
        chatBody.style.display = 'none';
        icon.className = 'fas fa-chevron-down ms-auto';
    }
};

window.sendChatMessage = async function() {
    const input = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendChatBtn');
    
    if (!input) return;
    
    const message = input.value.trim();
    
    if (!message) {
        alert('Vui lòng nhập câu hỏi!');
        return;
    }
    
    // Disable input và button khi đang gửi
    input.disabled = true;
    if (sendBtn) sendBtn.disabled = true;
    
    // Hiển thị tin nhắn của user
    addMessage(message, 'user');
    input.value = '';
    
    // Hiển thị typing indicator
    const typingId = showTypingIndicator();
    
    try {
        console.log('Sending message:', message); // Debug
        
        const response = await fetch('/api/ai-chat', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ 
                message: message,
                context: getCurrentExerciseContext()
            })
        });
        
        const data = await response.json();
        console.log('Response:', data); // Debug
        
        // Xóa typing indicator
        removeTypingIndicator(typingId);
        
        if (data.success) {
            addMessage(data.response, 'ai');
        } else {
            addMessage('❌ Xin lỗi, tôi gặp sự cố: ' + (data.error || 'Vui lòng thử lại!'), 'ai');
        }
    } catch (error) {
        console.error('Chat error:', error);
        removeTypingIndicator(typingId);
        addMessage('❌ Có lỗi kết nối. Vui lòng thử lại sau!', 'ai');
    } finally {
        // Enable lại input và button
        input.disabled = false;
        if (sendBtn) sendBtn.disabled = false;
        input.focus();
    }
};

window.handleChatKeyPress = function(event) {
    if (event.key === 'Enter') {
        event.preventDefault(); // Ngăn form submit nếu có
        sendChatMessage();
    }
};

function addMessage(text, sender) {
    const messagesDiv = document.getElementById('chatMessages');
    if (!messagesDiv) return;
    
    const messageDiv = document.createElement('div');
    messageDiv.className = `message ${sender}-message`;
    
    const time = new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
    
    // Xử lý text có thể chứa HTML
    const safeText = text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;')
        .replace(/\n/g, '<br>');
    
    messageDiv.innerHTML = `
        <div class="message-content">${safeText}</div>
        <div class="message-time">
            <i class="far fa-clock"></i> ${time}
        </div>
    `;
    
    messagesDiv.appendChild(messageDiv);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function showTypingIndicator() {
    const messagesDiv = document.getElementById('chatMessages');
    if (!messagesDiv) return null;
    
    const id = 'typing-' + Date.now();
    
    const typingDiv = document.createElement('div');
    typingDiv.id = id;
    typingDiv.className = 'message ai-message';
    typingDiv.innerHTML = `
        <div class="message-content">
            <div class="typing-indicator">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
        <div class="message-time">
            <i class="far fa-clock"></i> Đang suy nghĩ...
        </div>
    `;
    
    messagesDiv.appendChild(typingDiv);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
    return id;
}

function removeTypingIndicator(id) {
    if (!id) return;
    const element = document.getElementById(id);
    if (element) element.remove();
}

function getCurrentExerciseContext() {
    // Lấy thông tin bài tập hiện tại từ trang thuc_hanh_ai
    const exerciseTitle = document.getElementById('exerciseTitle');
    const exerciseDesc = document.getElementById('exerciseDescription');
    
    if (exerciseTitle && exerciseDesc) {
        return `${exerciseTitle.textContent}: ${exerciseDesc.textContent}`;
    }
    return '';
}

// Khởi tạo chat widget khi trang load xong
document.addEventListener('DOMContentLoaded', function() {
    console.log('Chat widget initialized'); // Debug
    
    // Kiểm tra xem đã có chat widget chưa
    if (!document.getElementById('aiChatWidget')) {
        const chatContainer = document.createElement('div');
        chatContainer.innerHTML = document.querySelector('script[data-chat-template]')?.textContent || '';
        
        // Nếu không tìm thấy template, tạo widget từ HTML ở trên
        if (!chatContainer.innerHTML) {
            const chatHTML = document.querySelector('.ai-chat-widget')?.outerHTML;
            if (chatHTML) {
                chatContainer.innerHTML = chatHTML;
            }
        }
        
        if (chatContainer.innerHTML) {
            document.body.appendChild(chatContainer.firstElementChild);
        }
    }
    
    // Focus vào input khi mở chat
    const chatInput = document.getElementById('chatInput');
    if (chatInput) {
        chatInput.addEventListener('focus', function() {
            console.log('Chat input focused');
        });
    }
});
</script>
