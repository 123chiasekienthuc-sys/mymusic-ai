{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Thêm Bản Nhạc Mới</h4>
                </div>
                <div class="card-body">
                    <form id="addMusicForm" method="POST" action="/bannhac/add" enctype="multipart/form-data">
                        <!-- Tên bản nhạc -->
                        <div class="mb-3">
                            <label for="songName" class="form-label">Tên bản nhạc <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="songName" name="tenbannhac" required placeholder="Nhập tên bản nhạc">
                        </div>
                        
                        <!-- Nhạc sĩ -->
                        <div class="mb-3">
                            <label for="composer" class="form-label">Nhạc sĩ <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="composer" name="tennhacsi" required placeholder="Nhập tên nhạc sĩ">
                        </div>
                        
                        <!-- Thông tin bổ sung -->
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="genre" class="form-label">Thể loại</label>
                                <select class="form-select" id="genre" name="theloai">
                                    <option value="">-- Chọn thể loại --</option>
                                    <option value="Pop">Pop</option>
                                    <option value="Rock">Rock</option>
                                    <option value="Classical">Classical</option>
                                    <option value="Jazz">Jazz</option>
                                    <option value="Country">Country</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="releaseYear" class="form-label">Năm phát hành</label>
                                <input type="number" class="form-control" id="releaseYear" name="namphathanh" min="1900" max="{{ current_year }}" placeholder="2023">
                            </div>
                        </div>

                        <!-- Thời lượng -->
                        <div class="mb-3">
                            <label for="duration" class="form-label">Thời lượng (mm:ss)</label>
                            <input type="text" class="form-control" id="duration" name="thoiluong" placeholder="03:45">
                        </div>
                        
                        <!-- File bản nhạc -->
                        <div class="mb-3">
                            <label for="musicFile" class="form-label">File bản nhạc <span class="text-danger">*</span></label>
                            <input class="form-control" type="file" id="musicFile" name="music_file" accept=".pdf,.mid,.midi" required>
                            <div class="form-text">Chấp nhận file: .pdf, .mid, .midi (tối đa 20MB)</div>
                        </div>
                        
                        <!-- Ghi chú -->
                        <div class="mb-3">
                            <label for="notes" class="form-label">Ghi chú</label>
                            <textarea class="form-control" id="notes" name="ghichu" rows="3" placeholder="Thông tin bổ sung về bản nhạc"></textarea>
                        </div>
                        
                        <!-- Nút submit -->
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="/bannhac" class="btn btn-secondary me-md-2">Hủy bỏ</a>
                            <button type="submit" class="btn btn-primary">Lưu bản nhạc</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Validate form
    document.getElementById('addMusicForm').addEventListener('submit', function(e) {
        const fileInput = document.getElementById('musicFile');
        const file = fileInput.files[0];
        
        // Kiểm tra kích thước file (tối đa 20MB)
        if (file && file.size > 20 * 1024 * 1024) {
            e.preventDefault();
            alert('File quá lớn! Kích thước tối đa là 20MB.');
            return false;
        }
        
        // Kiểm tra thời lượng có đúng định dạng không
        const duration = document.getElementById('duration').value;
        if (duration && !/^[0-9]{1,2}:[0-9]{2}$/.test(duration)) {
            e.preventDefault();
            alert('Thời lượng phải có định dạng mm:ss (ví dụ: 03:45)');
            return false;
        }

        // Kiểm tra năm phát hành hợp lệ
        const yearInput = document.getElementById('releaseYear');
        if (yearInput.value && (yearInput.value < 1900 || yearInput.value > new Date().getFullYear())) {
            e.preventDefault();
            alert('Năm phát hành không hợp lệ');
            return false;
        }
        
        return true;
    });
});
</script>

<style>
.form-label.required:after {
    content: " *";
    color: #dc3545;
}
</style>
{% endblock %}
