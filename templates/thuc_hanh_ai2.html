{% extends "base.html" %}
{% block content %}
<div class="container py-4">
    <div class="row">
        <div class="col-md-4">
            <div class="card shadow-sm mb-4 border-0">
                <div class="card-header bg-dark text-white py-3">
                    <h5 class="mb-0"><i class="fas fa-list-ul me-2"></i>Danh sách thử thách</h5>
                </div>
                <div class="list-group list-group-flush">
                    <button class="list-group-item list-group-item-action py-3" onclick="setExercise('Liệt kê tất cả bản nhạc của nhạc sĩ Văn Cao')">
                        <span class="badge bg-primary rounded-pill me-2">1</span> Truy vấn theo tên nhạc sĩ
                    </button>
                    <button class="list-group-item list-group-item-action py-3" onclick="setExercise('Tìm các bản thu âm thực hiện sau năm 2020')">
                        <span class="badge bg-primary rounded-pill me-2">2</span> Lọc dữ liệu theo thời gian
                    </button>
                    <button class="list-group-item list-group-item-action py-3" onclick="setExercise('Đếm số lượng bản nhạc của mỗi thể loại')">
                        <span class="badge bg-primary rounded-pill me-2">3</span> Gom nhóm và hàm COUNT
                    </button>
                </div>
            </div>
            
            <div class="alert alert-info shadow-sm">
                <small><i class="fas fa-info-circle"></i> <strong>Hướng dẫn:</strong> Chọn bài tập bên trên, nhập câu lệnh SQL vào ô bên phải và nhấn nút để AI chấm điểm.</small>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h4 class="text-primary d-flex align-items-center mb-3">
                        <i class="fas fa-robot me-2"></i> Trình chấm bài SQL tự động (AI)
                    </h4>
                    
                    <div class="mb-3 p-3 bg-light rounded border-start border-4 border-primary">
                        <p class="mb-0 text-muted">Đề bài hiện tại:</p>
                        <strong id="current-task" class="fs-5 text-dark">Vui lòng chọn bài tập bên trái...</strong>
                    </div>
                    
                    <div class="mb-3">
                        <label for="sql-input" class="form-label fw-bold">Câu lệnh SQL của bạn:</label>
                        <textarea id="sql-input" class="form-control font-monospace shadow-sm" rows="8" 
                            style="background-color: #f8f9fa; color: #212529;"
                            placeholder="SELECT * FROM ..."></textarea>
                    </div>
                    
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-3">
                        <button id="btn-submit" class="btn btn-primary btn-lg px-4 shadow" onclick="submitToAI()">
                            <i class="fas fa-magic me-2"></i> Kiểm tra với AI
                        </button>
                    </div>

                    <div id="ai-response" class="mt-4 d-none">
                        <div class="alert shadow-sm border-0" id="response-container">
                            <h5 id="response-title" class="fw-bold"></h5>
                            <hr>
                            <p id="response-text" class="mb-3"></p>
                            
                            <div id="sql-suggestion" class="bg-white p-3 border rounded d-none shadow-sm">
                                <h6 class="text-muted small text-uppercase fw-bold mb-2">Gợi ý câu lệnh chuẩn:</h6>
                                <pre class="mb-0"><code class="text-danger font-monospace" style="word-break: break-all; white-space: pre-wrap;"></code></pre>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
/**
 * Thiết lập bài tập hiện tại khi người dùng click vào danh sách bên trái
 */
function setExercise(desc) {
    document.getElementById('current-task').innerText = desc;
    document.getElementById('ai-response').classList.add('d-none');
    document.getElementById('sql-input').value = ""; // Xóa code cũ
    document.getElementById('sql-input').focus();
}

/**
 * Gửi yêu cầu chấm bài đến server Flask
 */
function submitToAI() {
    const sql_val = document.getElementById('sql-input').value.trim();
    const task_val = document.getElementById('current-task').innerText;
    const btn = document.getElementById('btn-submit');
    const resBox = document.getElementById('ai-response');
    const resContainer = document.getElementById('response-container');
    const sugBox = document.getElementById('sql-suggestion');

    // Kiểm tra dữ liệu đầu vào
    if(!sql_val) {
        alert("Bạn chưa nhập câu lệnh SQL!");
        return;
    }
    if(task_val.includes("Vui lòng chọn")) {
        alert("Bạn chưa chọn thử thách nào!");
        return;
    }

    // Hiển thị trạng thái đang xử lý (Loading)
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Đang phân tích...';
    
    resBox.classList.remove('d-none');
    sugBox.classList.add('d-none');
    document.getElementById('response-title').innerText = "⏳ Đang phân tích cú pháp...";
    document.getElementById('response-text').innerText = "AI đang kiểm tra tính logic và cú pháp câu lệnh của bạn. Vui lòng đợi trong giây lát...";
    resContainer.className = "alert alert-secondary py-4";

    // Gửi yêu cầu POST đến Server
    fetch('/thuc-hanh-ai', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            // Token CSRF để bảo mật, Flask sẽ nhận diện qua biến Jinja2
            'X-CSRFToken': '{{ csrf_token() if csrf_token is defined else "" }}'
        },
        body: JSON.stringify({
            sql_query: sql_val,
            exercise_name: task_val
        })
    })
    .then(response => {
        if (!response.ok) {
            throw new Error('Không thể kết nối với máy chủ (Lỗi ' + response.status + ')');
        }
        return response.json();
    })
    .then(data => {
        // Xử lý giao diện dựa trên kết quả AI trả về
        if(data.status === "Dung") {
            resContainer.className = "alert alert-success border-start border-5 border-success py-4";
            document.getElementById('response-title').innerHTML = '<i class="fas fa-check-circle me-2"></i> CHÍNH XÁC!';
        } else if(data.status === "Loi") {
            resContainer.className = "alert alert-danger border-start border-5 border-danger py-4";
            document.getElementById('response-title').innerHTML = '<i class="fas fa-exclamation-triangle me-2"></i> THÔNG BÁO';
        } else {
            resContainer.className = "alert alert-warning border-start border-5 border-warning py-4";
            document.getElementById('response-title').innerHTML = '<i class="fas fa-times-circle me-2"></i> CHƯA CHÍNH XÁC';
        }
        
        document.getElementById('response-text').innerText = data.feedback;
        
        // Hiển thị gợi ý nếu có
        if(data.sql_chuan) {
            sugBox.classList.remove('d-none');
            sugBox.querySelector('code').innerText = data.sql_chuan;
        }
    })
    .catch(err => {
        resContainer.className = "alert alert-danger py-4";
        document.getElementById('response-title').innerText = "❌ Lỗi kết nối";
        document.getElementById('response-text').innerText = "Có lỗi xảy ra: " + err.message;
    })
    .finally(() => {
        // Khôi phục trạng thái nút bấm
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-paper-plane me-2"></i> Kiểm tra với AI';
    });
}
</script>

<style>
    /* Làm đẹp font chữ code */
    .font-monospace {
        font-family: 'Cascadia Code', 'Courier New', monospace !important;
        font-size: 0.95rem;
    }
    /* Hiệu ứng mượt mà khi hiện kết quả */
    #ai-response {
        animation: fadeIn 0.5s ease-in-out;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
{% endblock %}
