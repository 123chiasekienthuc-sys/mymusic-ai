{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Thêm Bản Thu Âm Mới</h4>
                </div>
                <div class="card-body">
                    <form id="addRecordingForm" method="POST" action="/banthuam/add" enctype="multipart/form-data">
                        <!-- Bài hát -->
                        <div class="mb-3">
                            <label for="song" class="form-label">Bài hát <span class="text-danger">*</span></label>
                            <select class="form-select" id="song" name="idbannhac" required>
                                <option value="">-- Chọn bài hát --</option>
                                {% for song in songs %}
                                <option value="{{ song.idbannhac }}">{{ song.tenbannhac }} ({{ song.tennhacsi }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        
                        <!-- Ca sĩ -->
                        <div class="mb-3">
                            <label for="artist" class="form-label">Ca sĩ thể hiện <span class="text-danger">*</span></label>
                            <select class="form-select" id="artist" name="idcasi" required>
                                <option value="">-- Chọn ca sĩ --</option>
                                {% for artist in artists %}
                                <option value="{{ artist.idcasi }}">{{ artist.tencasi }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        
                        <!-- Thông tin bổ sung -->
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="recordingDate" class="form-label">Ngày thu âm</label>
                                <input type="date" class="form-control" id="recordingDate" name="ngaythu">
                            </div>
                            <div class="col-md-6">
                                <label for="duration" class="form-label">Thời lượng (mm:ss)</label>
                                <input type="text" class="form-control" id="duration" name="thoiluong" placeholder="03:45">
                            </div>
                        </div>
                        
                        <!-- File âm thanh -->
                        <div class="mb-3">
                            <label for="audioFile" class="form-label">File âm thanh <span class="text-danger">*</span></label>
                            <input class="form-control" type="file" id="audioFile" name="audio_file" accept="audio/*">
                            <div class="form-text">Chấp nhận file: .mp3, .wav, .aac (tối đa 20MB)</div>
                        </div>
                        
                        <!-- Ghi chú -->
                        <div class="mb-3">
                            <label for="notes" class="form-label">Ghi chú</label>
                            <textarea class="form-control" id="notes" name="ghichu" rows="3"></textarea>
                        </div>
                        
                        <!-- Nút submit -->
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="/banthuam" class="btn btn-secondary me-md-2">Hủy bỏ</a>
                            <button type="submit" class="btn btn-primary">Lưu bản thu</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Set ngày mặc định là hôm nay
    document.getElementById('recordingDate').valueAsDate = new Date();
    
    // Validate form
    document.getElementById('addRecordingForm').addEventListener('submit', function(e) {
        const fileInput = document.getElementById('audioFile');
        const file = fileInput.files[0];
        
        // Kiểm tra kích thước file (tối đa 20MB)
        if (file && file.size > 20 * 1024 * 1024) {
            e.preventDefault();
            alert('File quá lớn! Kích thước tối đa là 20MB.');
            return false;
        }
        
        // Kiểm tra thời lượng có đúng định dạng không
        const duration = document.getElementById('duration').value;
        if (duration && !/^[0-9]{1,2}:[0-9]{2}$/.test(duration)) {
            e.preventDefault();
            alert('Thời lượng phải có định dạng mm:ss (ví dụ: 03:45)');
            return false;
        }
        
        return true;
    });
});
</script>

<style>
.form-label.required:after {
    content: " *";
    color: #dc3545;
}
</style>
{% endblock %}
