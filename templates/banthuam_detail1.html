<!-- banthuam_detail.html -->
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết Bản Thu Âm | Music Manager</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body>
    <div class="container py-4">
        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 id="recording-title" class="display-5 fw-bold">Bản Thu Âm</h1>
            <div>
                <a id="edit-btn" class="btn btn-outline-primary me-2" href="#">
                    <i class="bi bi-pencil-square"></i> Chỉnh sửa
                </a>
                <button id="delete-btn" class="btn btn-outline-danger">
                    <i class="bi bi-trash"></i> Xóa
                </button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="row">
            <!-- Left Column - Audio Player -->
            <div class="col-lg-8">
                <div class="audio-player card shadow-sm mb-4">
                    <div class="card-body">
                        <div class="d-flex align-items-center mb-3">
                            <img id="artist-image" src="/static/images/default_artist.jpg" alt="Ca sĩ" class="rounded me-3 artist-thumbnail">
                            <div>
                                <h3 id="song-title">...</h3>
                                <p class="mb-1" id="artist-name">...</p>
                                <p class="text-muted small mb-0" id="composer-name">...</p>
                            </div>
                        </div>
                        
                        <!-- Audio Controls -->
                        <audio id="audio-player" controls class="w-100 mb-3"></audio>
                        
                        <!-- Lyrics Section -->
                        <div class="lyrics-section mt-4">
                            <h5 class="mb-3"><i class="bi bi-music-note-list"></i> Lời bài hát</h5>
                            <div class="lyrics-box" id="lyrics-content">
                                <p class="text-center text-muted">Đang tải lời bài hát...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Column - Metadata -->
            <div class="col-lg-4">
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0"><i class="bi bi-info-circle"></i> Thông tin bản thu</h5>
                    </div>
                    <div class="card-body">
                        <ul class="list-group list-group-flush">
                            <li class="list-group-item d-flex justify-content-between">
                                <span>Bài hát:</span>
                                <strong id="song-name">...</strong>
                            </li>
                            <li class="list-group-item d-flex justify-content-between">
                                <span>Ca sĩ:</span>
                                <strong id="singer-name">...</strong>
                            </li>
                            <li class="list-group-item d-flex justify-content-between">
                                <span>Nhạc sĩ:</span>
                                <strong id="composer-fullname">...</strong>
                            </li>
                            <li class="list-group-item d-flex justify-content-between">
                                <span>Ngày thu âm:</span>
                                <span id="recording-date">...</span>
                            </li>
                            <li class="list-group-item d-flex justify-content-between">
                                <span>Thể loại:</span>
                                <span id="song-genre">...</span>
                            </li>
                        </ul>
                    </div>
                </div>

                <!-- Related Recordings -->
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0"><i class="bi bi-collection-play"></i> Bản thu cùng bài hát</h5>
                    </div>
                    <div class="card-body">
                        <ul class="list-group list-group-flush" id="related-recordings">
                            <!-- Dynamic content will be loaded here -->
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Dữ liệu đã được inject từ Flask template
    const recording = JSON.parse('{{ recording | tojson | safe }}');
    const related = JSON.parse('{{ related_recordings | tojson | safe }}');
    
    // Populate main info
    document.getElementById('recording-title').textContent = recording.tenbannhac;
    document.getElementById('song-title').textContent = recording.tenbannhac;
    document.getElementById('song-name').textContent = recording.tenbannhac;
    document.getElementById('artist-name').textContent = recording.tencasi;
    document.getElementById('singer-name').textContent = recording.tencasi;
    document.getElementById('composer-name').textContent = `Sáng tác: ${recording.tennhacsi}`;
    document.getElementById('composer-fullname').textContent = recording.tennhacsi;
    
    // Format date
    const recordingDate = new Date(recording.ngaythu);
    document.getElementById('recording-date').textContent = 
        recordingDate.toLocaleDateString('vi-VN');
    
    // Set audio player
    const audioPlayer = document.getElementById('audio-player');
    audioPlayer.src = `/static/recordings/${recording.idbanthuam}.mp3`;
    
    // Set edit link
    document.getElementById('edit-btn').href = 
        `/banthuam/edit/${recording.idbanthuam}`;
    
    // Populate related recordings
    const container = document.getElementById('related-recordings');
    if (related.length > 0) {
        related.forEach(rec => {
            const li = document.createElement('li');
            li.className = 'list-group-item d-flex justify-content-between align-items-center';
            
            const recDate = new Date(rec.ngaythu);
            li.innerHTML = `
                <a href="/banthuam/detail/${rec.idbanthuam}">
                    ${rec.tencasi} (${recDate.getFullYear()})
                </a>
                <span class="badge bg-secondary">${rec.thoiluong || '--:--'}</span>
            `;
            container.appendChild(li);
        });
    } else {
        container.innerHTML = '<li class="list-group-item text-muted">Không có bản thu khác</li>';
    }
    
    // Delete button handler
    document.getElementById('delete-btn').addEventListener('click', function() {
        if (confirm('Bạn có chắc chắn muốn xóa bản thu này?')) {
            fetch(`/api/banthuam/${recording.idbanthuam}`, {
                method: 'DELETE'
            })
            .then(response => {
                if (response.ok) {
                    window.location.href = '/banthuam';
                }
            });
        }
    });
});
</script>
</body>
</html>
